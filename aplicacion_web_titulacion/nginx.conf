server {
    listen 80;
    server_name ml-prediction-energy-6774-6784.me www.ml-prediction-energy-6774-6784.me;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ml-prediction-energy-6774-6784.me www.ml-prediction-energy-6774-6784.me;

    ssl_certificate /etc/letsencrypt/live/ml-prediction-energy-6774-6784.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ml-prediction-energy-6774-6784.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy para el recolector de datos en el puerto 8080
    location /api/ {
        proxy_pass http://recolector:8080; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy para el backend de ML filtrando el prefijo /ml/
    location /ml/ {
        rewrite ^/ml/(.*) /$1 break;
        proxy_pass http://ml-python:8080; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    # Proxy para el verificador de roles/auth filtrando el prefijo /auth/
    location /auth/ {
        rewrite ^/auth/(.*) /$1 break;
        proxy_pass http://verificador:8080; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}